name: Build APK

# Runs on every push to main and on every pull request.
# Produces a debug APK that you can download from the Actions tab.
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:   # lets you trigger manually from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      # If gradlew doesn't exist yet (fresh repo) generate it.
      - name: Ensure Gradle wrapper exists
        run: |
          if [ ! -f ./gradlew ]; then
            gradle wrapper --gradle-version 8.9
          fi
          chmod +x ./gradlew

      # Firebase google-services.json is not in the repo (secrets!).
      # We write it from a GitHub Secret at build time. See README for setup.
      - name: Write google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -z "$GOOGLE_SERVICES_JSON" ]; then
            echo "GOOGLE_SERVICES_JSON secret not set. Using placeholder."
            cp app/google-services.placeholder.json app/google-services.json
          else
            echo "$GOOGLE_SERVICES_JSON" > app/google-services.json
          fi

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: fixkar-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 14
